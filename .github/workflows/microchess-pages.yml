name: Deploy MicroChess Dashboard to GitHub Pages

on:
  push:
    branches:
      - microchess
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: microchess
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install parent repository dependencies
        run: |
          npm ci --no-audit --no-fund

      - name: Install microchess dependencies
        run: |
          cd microchess
          npm ci --install-links=false --no-audit --no-fund

      # Webpack compiles and bakes the secrets in right here safely
      - name: Compile production assets via Webpack
        env:
          NODE_ENV: production
          JSONBIN_ACCESS_KEY: ${{ secrets.JSONBIN_ACCESS_KEY }}
          JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}
        run: |
          cd microchess
          npm run build

      - name: Verify Webpack production assets generation
        run: |
          echo "=== Auditing microchess/dist directory structure ==="
          ls -la microchess/dist/

      - name: Seed local base state file for CI server verification
        run: |
          echo '[{"process":"microchess-nn","message":"Initial state payload","status":"generated","timestamp":"2026-07-06T22:00:00.000Z","move_count":0,"result":"*","reason":"","final_fen":"rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1","pgn":"","rng":"mulberry32","rng_version":null,"seed":"0000000000000000"}]' > microchess/randomchess.json

      - name: Install PM2 globally
        run: npm install -g pm2

      - name: Start app with PM2 (CI Verification Pass)
        run: |
          cd microchess
          if [ -f microchess.config.js ]; then
            pm2 start microchess.config.js
          else
            echo "No PM2 config found, skipping runtime test."
          fi

      - name: List PM2 processes (Build Logs Audit)
        run: pm2 list

      # This mimics your exact local workspace configuration layout on GitHub Pages
      - name: Stage distribution build artifacts in pages directory
        run: |
          rm -rf pages
          mkdir -p pages
          
          # 1. Maps your HTML landing file to root index.html
          cp microchess/microchess.html pages/index.html
          
          # 2. Re-creates dist/ structure containing the compiled bundle.js
          mkdir -p pages/dist
          cp -r microchess/dist/* pages/dist/
          
          # 3. Re-creates js/ folder structure for asset paths
          mkdir -p pages/js
          cp -r microchess/js/* pages/js/ || echo "No source folder found"

          # 4. Fallback database json positioning
          cp microchess/randomchess.json pages/randomchess.json
          
          echo "=== Staged pages/ layout verification ==="
          ls -la pages
          echo "=== Staged pages/dist/ payload verification ==="
          ls -la pages/dist/

      - name: Setup GitHub Pages hosting configuration
        uses: actions/configure-pages@v5

      - name: Upload compiled website deployment archive
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: './pages'
          retention-days: 1

      - name: Deploy active assets to GitHub Pages live domain
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
