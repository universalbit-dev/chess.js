name: Deploy MicroChess Dashboard to GitHub Pages

on:
  push:
    branches:
      - microchess
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: microchess
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install parent repository dependencies
        run: |
          npm ci --no-audit --no-fund

      - name: Install microchess dependencies
        run: |
          cd microchess
          npm ci --install-links=false --no-audit --no-fund

      # Step 3: Compile production assets via Webpack with explicit Environment Mappings
      - name: Compile production assets via Webpack
        env:
          NODE_ENV: production
          JSONBIN_ACCESS_KEY: ${{ secrets.JSONBIN_KEY }}     # <-- MAPS SECRETS TO WEBPACK VARIABLES
          JSONBIN_BIN_ID: ${{ secrets.JSONBIN_BIN_ID }}       # <-- MAPS SECRETS TO WEBPACK VARIABLES
        run: |
          cd microchess
          npm run build

      - name: Seed local base state file for CI server verification
        run: |
          echo '[{"process":"microchess-nn","message":"Initial state payload","status":"generated","timestamp":"2026-07-06T22:00:00.000Z","move_count":0,"result":"*","reason":"","final_fen":"rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1","pgn":"","rng":"mulberry32","rng_version":null,"seed":"0000000000000000"}]' > microchess/randomchess.json

      - name: Install PM2 globally
        run: npm install -g pm2

      - name: Start app with PM2 (CI Verification Pass)
        run: |
          cd microchess
          if [ -f microchess.config.js ]; then
            pm2 start microchess.config.js
          else
            echo "No PM2 config found, skipping runtime test."
          fi

      - name: List PM2 processes (Build Logs Audit)
        run: pm2 list

      - name: Stage distribution build artifacts in pages directory
        run: |
          rm -rf pages
          mkdir -p pages
          
          # Map microchess.html directly to index.html for root web access
          cp microchess/microchess.html pages/index.html
          
          # Copy the compiled bundle distribution folder assets
          cp -r microchess/dist pages/

          # Copy your baseline snapshot database file
          cp microchess/randomchess.json pages/randomchess.json
          
          echo "=== Staged pages/ directory verification layout ==="
          ls -la pages
          ls -la pages/dist

      - name: Setup GitHub Pages hosting configuration
        uses: actions/configure-pages@v5

      # Explicit namespacing constraints prevent multiple artifact collision races
      - name: Upload compiled website deployment archive
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: './pages'
          retention-days: 1

      - name: Deploy active assets to GitHub Pages live domain
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
