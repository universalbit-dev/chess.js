name: Deploy MicroChess Dashboard to GitHub Pages

on:
  push:
    branches:
      - microchess
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Point this job directly to your custom microchess environment profile
    environment:
      name: microchess
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js Runtime Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Step 1: Install parent repository dependencies so peggy/typescript are available
      - name: Install parent repository dependencies
        run: |
          npm ci --no-audit --no-fund

      # Step 2: Install microchess dependencies
      - name: Install microchess dependencies
        run: |
          cd microchess
          npm ci --install-links=false --no-audit --no-fund

      # Step 3: Compile production assets via Webpack, passing your custom Environment secret
      - name: Compile production assets via Webpack
        env:
          JSONBIN_API_KEY: ${{ secrets.JSONBIN_KEY }}
        run: |
          cd microchess
          npm run build

      # Step 4: Install PM2 globally for CI Smoke Testing
      - name: Install PM2 globally
        run: npm install -g pm2

      # Step 5: Start app with PM2 (For CI validation testing only)
      - name: Start app with PM2 (CI Verification Pass)
        run: |
          cd microchess
          if [ -f microchess.config.js ]; then
            pm2 start microchess.config.js
          else
            echo "No PM2 config found, skipping runtime test."
          fi

      # Step 6: Log PM2 process matrix status to build logs
      - name: List PM2 processes (Build Logs Audit)
        run: pm2 list

      # Step 7: Stage distribution build artifacts into a clean deployment workspace
      - name: Stage distribution build artifacts in pages directory
        run: |
          # 1. Clean workspace completely to remove default markdown page structures
          rm -rf pages
          mkdir -p pages
          
          # 2. Map microchess.html directly to index.html for root domain hosting
          cp microchess/microchess.html pages/index.html
          
          # 3. Preserve the exact 'dist/' folder relative structure so the HTML script tags don't 404
          cp -r microchess/dist pages/
          
          echo "=== Staged pages/ directory verification layout ==="
          ls -la pages
          ls -la pages/dist

      # Step 8: Deliver static assets straight to the live web domain
      - name: Setup GitHub Pages hosting configuration
        uses: actions/configure-pages@v5

      - name: Upload compiled website deployment archive
        uses: actions/upload-pages-artifact@v3
        with:
          path: './pages'

      - name: Deploy active assets to GitHub Pages live domain
        id: deployment
        uses: actions/deploy-pages@v4
